apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tato-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FiserVojta/coolcornersdeployment.git
    targetRevision: HEAD
    path: tato-backend
  destination:
    server: https://kubernetes.default.svc
    namespace: tato
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
