apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coolcorners-keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://codecentric.github.io/helm-charts
    chart: keycloakx
    targetRevision: 2.4.1 # 👈 VERIFY: `helm search repo codecentric/keycloakx --versions`
    helm:
      releaseName: keycloak
      values: |
        # Keep the service name "keycloak-http" so the existing ingress matches.
        fullnameOverride: keycloak

        replicas: 1

        image:
          repository: quay.io/keycloak/keycloak
          tag: "26.0.5"

        # Start in production mode, served under /keycloak, behind the nginx ingress (TLS terminates there).
        command:
          - "/opt/keycloak/bin/kc.sh"
          - "--verbose"
          - "start"
          - "--http-enabled=true"
          - "--http-port=8080"
          - "--hostname-strict=false"
          - "--http-relative-path=/keycloak"
          - "--proxy-headers=xforwarded"
          - "--cache=local" # single replica → no Infinispan/JGroups clustering

        # dbchecker (DB-wait init container) requires the chart's structured
        # database.* values; we configure the DB via extraEnv below instead, so
        # leave it off. Keycloak retries the DB connection itself on startup.
        dbchecker:
          enabled: false

        extraEnv: |
          - name: KC_DB
            value: postgres
          - name: KC_DB_URL_HOST
            value: "172.16.0.5"
          - name: KC_DB_URL_PORT
            value: "5432"
          - name: KC_DB_URL_DATABASE
            value: "keycloakdb"
          - name: KC_DB_USERNAME
            value: "keycloakadmin"
          - name: KC_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: KC_DB_PASSWORD
          - name: KC_DB_URL_PROPERTIES
            value: "?sslmode=require"
          - name: KC_BOOTSTRAP_ADMIN_USERNAME
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: KC_BOOTSTRAP_ADMIN_USERNAME
          - name: KC_BOOTSTRAP_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: KC_BOOTSTRAP_ADMIN_PASSWORD
          - name: KC_HOSTNAME
            value: "https://coolcorners.org/keycloak"
          - name: KC_HEALTH_ENABLED
            value: "true"

        # TLS is terminated at the ingress; the pod speaks plain HTTP.
        http:
          relativePath: "/keycloak"

        service:
          httpPort: 80

        # We manage the ingress separately (keycloak-ingress-ip-prefix.yaml).
        ingress:
          enabled: false

        # Keycloak 26 exposes health on the management port (9000); use TCP probes
        # to avoid coupling readiness to the relative-path health endpoint.
        readinessProbe: |
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe: |
          tcpSocket:
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 3

        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
