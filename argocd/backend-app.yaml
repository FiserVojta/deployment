apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coolcorners-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FiserVojta/coolcornersdeployment.git # 👈 UPDATE THIS
    targetRevision: HEAD
    path: backend
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
