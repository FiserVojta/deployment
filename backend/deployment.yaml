apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: api
          image: ghcr.io/fiservojta/coolcorners-be:0.0.50-6ea2854
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://172.16.0.5:5432/corners?sslmode=require&currentSchema=app,public"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: db-creds, key: db-username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-creds, key: db-password } }
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: db-creds, key: s3-access-key } }
            - name: S3_KEY
              valueFrom: { secretKeyRef: { name: db-creds, key: s3-key } }
            # Scaleway Object Storage (overrides the DO Spaces values baked into application.properties)
            - name: DIGITALOCEAN_SPACES_REGION
              value: "fr-par"
            - name: DIGITALOCEAN_SPACES_ENDPOINT
              value: "https://s3.fr-par.scw.cloud"
            - name: DIGITALOCEAN_SPACES_BUCKET
              value: "cornersdev"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA
              value: "app"
            # Keycloak OAuth2 Configuration
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "https://coolcorners.org/keycloak/realms/cool-corners"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # Without an explicit cap the JVM sizes the heap at 25% of the container limit
            # (~128Mi), which is too small for image processing during file uploads.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
