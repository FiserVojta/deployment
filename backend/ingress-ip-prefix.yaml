apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ip-prefix
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80