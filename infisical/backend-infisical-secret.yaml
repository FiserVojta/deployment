apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: backend-secrets
  namespace: app
spec:
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: REPLACE_WITH_PROJECT_SLUG
        envSlug: REPLACE_WITH_ENV_SLUG
        secretsPath: /backend
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-system
  managedKubeSecretReferences:
    - secretName: db-creds
      secretNamespace: app
      creationPolicy: Owner
      template:
        includeAllSecrets: true
