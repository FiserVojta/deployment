name: Deploy to ArgoCD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'keycloak/**'
      - 'tato-backend/**'
      - 'tato-frontend/**'
      - 'argocd/**'

jobs:
  trigger-argocd-sync:
    runs-on: ubuntu-latest
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Verify ArgoCD access
        run: |
          set -euo pipefail
          : "${ARGOCD_SERVER:?ARGOCD_SERVER is not set}"
          : "${ARGOCD_AUTH_TOKEN:?ARGOCD_AUTH_TOKEN is not set}"
          argocd app list --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure

      - name: Sync Backend App
        if: contains(github.event.head_commit.modified, 'backend/') || contains(github.event.head_commit.added, 'backend/')
        run: |
          set -euo pipefail
          argocd app sync coolcorners-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app wait coolcorners-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure

      - name: Sync Frontend App
        if: contains(github.event.head_commit.modified, 'frontend/') || contains(github.event.head_commit.added, 'frontend/')
        run: |
          set -euo pipefail
          argocd app sync coolcorners-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app wait coolcorners-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure

      - name: Sync Tato Backend App
        if: contains(github.event.head_commit.modified, 'tato-backend/') || contains(github.event.head_commit.added, 'tato-backend/') || contains(github.event.head_commit.modified, 'argocd/tato-backend-app.yaml') || contains(github.event.head_commit.added, 'argocd/tato-backend-app.yaml')
        run: |
          set -euo pipefail
          argocd app sync tato-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app wait tato-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure

      - name: Sync Tato Frontend App
        if: contains(github.event.head_commit.modified, 'tato-frontend/') || contains(github.event.head_commit.added, 'tato-frontend/') || contains(github.event.head_commit.modified, 'argocd/tato-frontend-app.yaml') || contains(github.event.head_commit.added, 'argocd/tato-frontend-app.yaml')
        run: |
          set -euo pipefail
          argocd app sync tato-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app wait tato-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure

      - name: Sync All Apps (if other files changed)
        if: |
          !contains(github.event.head_commit.modified, 'backend/') &&
          !contains(github.event.head_commit.modified, 'frontend/') &&
          !contains(github.event.head_commit.modified, 'tato-backend/') &&
          !contains(github.event.head_commit.modified, 'tato-frontend/')
        run: |
          set -euo pipefail
          argocd app sync coolcorners-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app sync coolcorners-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app sync tato-backend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
          argocd app sync tato-frontend --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --insecure
